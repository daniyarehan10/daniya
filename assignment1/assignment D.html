<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie</title>
    <style>
     @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fff;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: #fff;
            padding: 20px 0;
            border-bottom: 1px solid #f1f1f1;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #27ae60;
            text-decoration: none;
        }

        .logo i {
            color: #27ae60;
            margin-right: 5px;
        }

        /* Navbar */
        nav {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        nav ul {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: #666;
            font-size: 15px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav ul li a.active {
            background: #27ae60;
            color: #fff;
            padding: 8px 20px;
            border-radius: 5px;
        }

        nav ul li a:hover {
            color: #27ae60;
        }

        nav ul li a.active:hover {
            background: #219150;
            color: #fff;
        }

        .nav-icons {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            background: #f8f8f8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1c40f;
            font-size: 16px;
            text-decoration: none;
            transition: 0.3s;
        }

        .icon-btn:hover {
            background: #f1c40f;
            color: #fff;
        }

        /* Hero Section */
        .hero {
            padding: 60px 0 100px;
            position: relative;
        }

        .hero-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }

        .hero-text {
            flex: 1;
            max-width: 500px;
        }

        .hero-text .subtitle {
            color: #27ae60;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .hero-text h1 {
            font-size: 60px;
            font-weight: 700;
            color: #f1c40f;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .hero-text p {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .btn-order {
            display: inline-block;
            background: #f1c40f;
            color: #fff;
            padding: 12px 30px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-order:hover {
            background: #d4ac0d;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .hero-image img {
            max-width: 100%;
            width: 500px;
            height: auto;
        }

        /* Slider Dots */
        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
        }

        .dot.active {
            background: #27ae60;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .hero-content {
                flex-direction: column;
                text-align: center;
            }

            .hero-text h1 {
                font-size: 45px;
            }

            nav ul {
                gap: 15px;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 20px;
            }

            nav {
                flex-direction: column;
                gap: 20px;
            }

            nav ul {
                flex-wrap: wrap;
                justify-content: center;
            }

            .hero-text h1 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo"><i class="fas fa-utensils"></i>Foodie.</a>
                <nav>
                    <ul>
                        <li><a href="#" class="active">Home</a></li>
                        <li><a href="#">Dishes</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Menu</a></li>
                        <li><a href="#">Testimonials</a></li>
                        <li><a href="#">Order</a></li>
                    </ul>
                    <div class="nav-icons">
                        <a href="#" class="icon-btn"><i class="fas fa-search"></i></a>
                        <a href="#" class="icon-btn"><i class="fas fa-heart"></i></a>
                        <a href="#" class="icon-btn"><i class="fas fa-shopping-cart"></i></a>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="hero-text">
                    <p class="subtitle">Our Special Dish</p>
                    <h1>Cheese Burger</h1>
                    <p>Lorem Ipsum Dolor Sit Amet Consectetur Adipisicing Elit. Sit Natus Dolor Cumque?</p>
                    <a href="#" class="btn-order">Order Now</a>
                </div>
                <div class="hero-image">
                    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&auto=format&fit=crop" alt="Cheese Burger">
                </div>
            </div>
            <div class="slider-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    </section>
</body>
</html>
